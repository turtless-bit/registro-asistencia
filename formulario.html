<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Asistencia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --success: #10b981;
      --error: #ef4444;
      --text: #e8eaf0;
      --muted: #6b7280;
      --border: #2d3148;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 25px;
      width: 100%;
      max-width: 450px;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .result-icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Registro UNAJMA</h1>
    <p id="eventoNombre">Cargando evento...</p>
  </div>

  <div class="card">
    <div class="screen active" id="screenForm">
      <div class="field"><label>Nombres</label><input type="text" id="nombres"></div>
      <div class="field"><label>Apellidos</label><input type="text" id="apellidos"></div>
      <div class="field"><label>DNI</label><input type="text" id="dni" maxlength="8"></div>
      <button class="btn" onclick="iniciarRegistro()">Registrar Ingreso</button>
    </div>

    <div class="screen" id="screenGPS">
      <div class="spinner"></div>
      <p style="text-align:center">Verificando ubicación GPS...</p>
    </div>

    <div class="screen" id="screenWaiting">
      <div class="result-icon">✅</div>
      <h2 style="text-align:center">Ingreso Exitoso</h2>
      <p style="text-align:center; color:var(--muted); margin: 15px 0">Mantén esta ventana abierta. Al finalizar el
        evento, presiona el botón de abajo.</p>
      <button class="btn" onclick="ejecutarCheck2Final()">Registrar Salida</button>
    </div>

    <div class="screen" id="screenFinal">
      <div class="result-icon">🎉</div>
      <h2 style="text-align:center">¡Asistencia Completa!</h2>
      <p style="text-align:center; color:var(--muted)">Ya puedes cerrar esta ventana.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ccvluulbkjofghzpttfb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdmx1dWxia2pvZmdoenB0dGZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjI1ODksImV4cCI6MjA5MzU5ODU4OX0.Na9TJ5g3Xr22E7h-28Eol0Bv-ikXsYWvuRsoKkmRrfI';

    let eventoId, asistenciaId;

    async function sb(path, opts = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        ...opts
      });
      return res.ok ? await res.json() : null;
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function cargarEvento() {
      const params = new URLSearchParams(window.location.search);
      eventoId = params.get('evento');
      if (!eventoId) return alert("Enlace inválido");
      const data = await sb(`eventos?id=eq.${eventoId}`);
      if (data) document.getElementById('eventoNombre').textContent = data[0].nombre;
    }

    async function iniciarRegistro() {
      const nombres = document.getElementById('nombres').value;
      const dni = document.getElementById('dni').value;
      if (!nombres || dni.length !== 8) return alert("Datos incompletos");

      showScreen('screenGPS');
      const gps = await obtenerGPS();

      const res = await sb('asistencias', {
        method: 'POST',
        body: JSON.stringify({
          evento_id: eventoId,
          nombre: nombres,
          apellidos: document.getElementById('apellidos').value,
          dni: dni,
          check1_lat: gps.lat, check1_lng: gps.lng,
          check1_hora: new Date().toISOString(),
          estado: 'pendiente'
        })
      });

      if (res) {
        asistenciaId = res[0].id;
        showScreen('screenWaiting');
      }
    }

    async function ejecutarCheck2Final() {
      showScreen('screenGPS');
      const gps = await obtenerGPS();

      await sb(`asistencias?id=eq.${asistenciaId}`, {
        method: 'PATCH',
        body: JSON.stringify({
          check2_lat: gps.lat, check2_lng: gps.lng,
          check2_hora: new Date().toISOString(),
          estado: 'completado'
        })
      });
      showScreen('screenFinal');
    }

    function obtenerGPS() {
      return new Promise(resolve => {
        navigator.geolocation.getCurrentPosition(
          p => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
          () => resolve({ lat: 0, lng: 0 }),
          { enableHighAccuracy: true }
        );
      });
    }

    cargarEvento();
  </script>
</body>

</html>
