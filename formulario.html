<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Asistencia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --success: #10b981;
      --error: #ef4444;
      --warn: #f59e0b;
      --text: #e8eaf0;
      --muted: #6b7280;
      --border: #2d3148;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* Tu CSS original se mantiene intacto... */
    .app-container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .event-badge {
      display: inline-block;
      background: rgba(79, 142, 247, 0.1);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      border: 1px solid rgba(79, 142, 247, 0.2);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.85rem;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .desc {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.1);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 142, 247, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .timer-card {
      background: var(--surface2);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      margin: 24px 0;
      border: 1px solid var(--border);
    }

    .timer-val {
      font-size: 3rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .alert {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 24px;
      display: none;
      line-height: 1.5;
      border-left: 4px solid transparent;
    }

    .alert.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: #ff8e8e;
      border-left-color: var(--error);
    }

    .alert.success {
      display: block;
      background: rgba(16, 185, 129, 0.1);
      color: #7ee7c7;
      border-left-color: var(--success);
    }

    .loader {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="card" id="mainCard">
      <div id="globalAlert" class="alert"></div>

      <div class="header">
        <div id="eventBadge" class="event-badge">Evento</div>
        <h1 id="eventTitle">Asistencia</h1>
        <p class="desc" id="eventDesc">Por favor, completa tus datos para registrar tu ingreso.</p>
      </div>

      <div id="step1" class="step active">
        <div class="field">
          <label>Documento de Identidad (DNI)</label>
          <input type="text" id="dni" placeholder="00000000" inputmode="numeric">
        </div>
        <div class="field">
          <label>Nombres</label>
          <input type="text" id="nombre" placeholder="Tus nombres">
        </div>
        <div class="field">
          <label>Apellidos</label>
          <input type="text" id="apellidos" placeholder="Tus apellidos">
        </div>
        <div class="field">
          <label>Correo Institucional</label>
          <input type="email" id="correo" placeholder="ejemplo@unajma.edu.pe">
        </div>
        <button class="btn" id="btn1" onclick="procesarPaso1()">
          <div class="loader" id="loader1"></div>
          Registrar Ingreso
        </button>
      </div>

      <div id="step2" class="step">
        <div class="alert success" style="display:block">Ingreso registrado correctamente.</div>
        <div class="timer-card">
          <div class="timer-val" id="timer">00:00</div>
          <div class="timer-label">Tiempo para cierre de asistencia</div>
        </div>
        <p style="font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:20px">
          Mantén esta ventana abierta. El botón de salida se habilitará automáticamente al finalizar el tiempo.
        </p>
        <button class="btn" id="btn2" disabled onclick="procesarPaso2()">
          <div class="loader" id="loader2"></div>
          Registrar Salida
        </button>
      </div>

      <div id="stepResult" class="step" style="text-align:center">
        <div id="resultContent"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ccvluulbkjofghzpttfb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdmx1dWxia2pvZmdoenB0dGZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjI1ODksImV4cCI6MjA5MzU5ODU4OX0.Na9TJ5g3Xr22E7h-28Eol0Bv-ikXsYWvuRsoKkmRrfI';

    const params = new URLSearchParams(window.location.search);
    const EVENTO_ID = params.get('evento');

    let eventoData = null;
    let asistenciaId = null;
    let timerInterval = null;
    let eventoFinMs = 0;

    async function sbFetch(path, opts = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation',
          ...opts.headers
        },
        ...opts
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'Error en el servidor');
      }
      return res.json();
    }

    async function cargarEvento() {
      if (!EVENTO_ID) {
        mostrarAlerta('Enlace de evento no válido.', 'error');
        return;
      }
      try {
        const data = await sbFetch(`eventos?id=eq.${EVENTO_ID}&select=*`);
        if (!data.length) throw new Error('Evento no encontrado.');
        eventoData = data[0];

        document.getElementById('eventTitle').textContent = eventoData.nombre;
        document.getElementById('eventBadge').textContent = eventoData.nombre;

        // --- ÚNICA CORRECCIÓN: Cálculo de tiempo basado en el nuevo campo del admin ---
        const durMin = eventoData.duracion_total_minutos || 90;
        if (eventoData.fecha_completa) {
          const inicioMs = new Date(eventoData.fecha_completa).getTime();
          eventoFinMs = inicioMs + (durMin * 60 * 1000);
        } else {
          // Fallback para eventos antiguos
          eventoFinMs = Date.now() + (durMin * 60 * 1000);
        }
        // -----------------------------------------------------------------------------

        const localId = localStorage.getItem(`asistencia_id_${EVENTO_ID}`);
        if (localId) {
          asistenciaId = localId;
          cambiarPaso(2);
          iniciarCronometro();
        }
      } catch (e) {
        mostrarAlerta(e.message, 'error');
      }
    }

    // El resto de tus funciones originales (procesarPaso1, procesarPaso2, etc.) se mantienen igual
    async function procesarPaso1() {
      const dni = document.getElementById('dni').value.trim();
      const nombre = document.getElementById('nombre').value.trim();
      const apellidos = document.getElementById('apellidos').value.trim();
      const correo = document.getElementById('correo').value.trim();

      if (!dni || !nombre || !apellidos) {
        mostrarAlerta('Completa los campos obligatorios.', 'error');
        return;
      }

      toggleLoader(1, true);
      try {
        const pos = await obtenerUbicacion();
        const estaDentro = validarZona(pos.lat, pos.lng);

        if (!estaDentro) {
          throw new Error('Debes estar en el lugar del evento para registrar tu ingreso.');
        }

        const res = await sbFetch('asistencias', {
          method: 'POST',
          body: JSON.stringify({
            evento_id: EVENTO_ID,
            dni, nombre, apellidos, correo,
            check1_hora: new Date().toISOString(),
            check1_valido: true,
            estado: 'pendiente'
          })
        });

        asistenciaId = res[0].id;
        localStorage.setItem(`asistencia_id_${EVENTO_ID}`, asistenciaId);
        cambiarPaso(2);
        iniciarCronometro();
      } catch (e) {
        mostrarAlerta(e.message, 'error');
      } finally {
        toggleLoader(1, false);
      }
    }

    async function procesarPaso2() {
      toggleLoader(2, true);
      try {
        const pos = await obtenerUbicacion();
        const estaDentro = validarZona(pos.lat, pos.lng);

        await sbFetch(`asistencias?id=eq.${asistenciaId}`, {
          method: 'PATCH',
          body: JSON.stringify({
            check2_hora: new Date().toISOString(),
            check2_valido: estaDentro,
            estado: estaDentro ? 'completado' : 'parcial'
          })
        });

        finalizarApp(estaDentro);
      } catch (e) {
        mostrarAlerta(e.message, 'error');
      } finally {
        toggleLoader(2, false);
      }
    }

    function iniciarCronometro() {
      if (timerInterval) clearInterval(timerInterval);
      const display = document.getElementById('timer');
      const btn2 = document.getElementById('btn2');

      timerInterval = setInterval(() => {
        const ahora = Date.now();
        const resto = eventoFinMs - ahora;

        if (resto <= 0) {
          clearInterval(timerInterval);
          display.textContent = "00:00";
          btn2.disabled = false;
          return;
        }

        const m = Math.floor(resto / 60000);
        const s = Math.floor((resto % 60000) / 1000);
        display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }, 1000);
    }

    function obtenerUbicacion() {
      return new Promise((res, rej) => {
        if (!navigator.geolocation) rej(new Error('GPS no soportado en este navegador.'));
        navigator.geolocation.getCurrentPosition(
          p => res({ lat: p.coords.latitude, lng: p.coords.longitude }),
          e => rej(new Error('Activa el GPS y permite el acceso para continuar.')),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });
    }

    function validarZona(lat, lng) {
      if (!eventoData.perimetro || eventoData.perimetro.length < 3) return true;
      let x = lat, y = lng;
      let inside = false;
      const vs = eventoData.perimetro;
      for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i].lat, yi = vs[i].lng;
        let xj = vs[j].lat, yj = vs[j].lng;
        let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function cambiarPaso(p) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + p).classList.add('active');
    }

    function mostrarAlerta(m, t) {
      const a = document.getElementById('globalAlert');
      a.textContent = m;
      a.className = 'alert ' + t;
      window.scrollTo(0, 0);
    }

    function toggleLoader(s, show) {
      document.getElementById('loader' + s).style.display = show ? 'block' : 'none';
      document.getElementById('btn' + s).disabled = show;
    }

    function finalizarApp(ok) {
      cambiarPaso('Result');
      const content = document.getElementById('resultContent');
      content.innerHTML = ok
        ? `<div style="font-size:4rem">✅</div><h2>¡Asistencia Completa!</h2><p>Tu registro se ha guardado correctamente.</p>`
        : `<div style="font-size:4rem">⚠️</div><h2>Registro Parcial</h2><p>Se registró tu salida, pero estabas fuera de la zona permitida.</p>`;
    }

    cargarEvento();
  </script>
</body>

</html>
