<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — UNAJMA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ... (Mantengo tus estilos base por brevedad) ... */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

    :root {
      --bg: #0a0c14;
      --surface: #12151f;
      --surface2: #1a1e2e;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --text: #e8eaf0;
      --muted: #6b7280;
      --border: #252a40;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .sidebar {
      position: fixed;
      width: 220px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0;
    }

    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .nav-item.active {
      color: var(--accent);
      background: rgba(79, 142, 247, 0.05);
      border-left: 3px solid var(--accent);
    }

    .main {
      margin-left: 220px;
      padding: 40px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .form-card {
      background: var(--surface);
      padding: 25px;
      border-radius: 15px;
      border: 1px solid var(--border);
      max-width: 700px;
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px;
      color: #fff;
      border-radius: 8px;
      outline: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    #map {
      height: 450px;
      border-radius: 12px;
      margin-top: 15px;
      border: 1px solid var(--border);
    }

    .table-wrap {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-top: 20px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: var(--surface2);
      padding: 12px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div class="nav-item active" onclick="showPage('pageRegistros')">📊 Registros</div>
    <div class="nav-item" onclick="showPage('pageEventos')">📅 Eventos</div>
    <div class="nav-item" onclick="showPage('pagePerimetro')">📍 Perímetro</div>
  </div>

  <div class="main">
    <div class="page active" id="pageRegistros">
      <h1>Asistencia</h1>
      <select id="selectorEventoRegistros" onchange="cargarRegistros()" style="margin: 20px 0;"></select>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>DNI</th>
              <th>Estado</th>
              <th>Entrada</th>
              <th>Salida</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </div>

    <div class="page" id="pageEventos">
      <h1>Gestión de Eventos</h1>
      <div class="form-card">
        <div class="field"><label>Nombre</label><input type="text" id="evNombre"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
          <div class="field"><label>Fecha</label><input type="date" id="evFecha"></div>
          <div class="field"><label>Hora Inicio</label><input type="time" id="evHoraInicio"></div>
          <div class="field"><label>Duración (minutos)</label><input type="number" id="evDuracion" value="90"></div>
        </div>
        <button class="btn-primary" onclick="crearEvento()">Crear Evento</button>
      </div>
      <div id="qrSection"
        style="display:none; margin-top: 20px; padding: 20px; background: #fff; border-radius: 10px; color: #000; text-align: center;">
        <div id="qrBox" style="display: inline-block;"></div>
        <p id="qrUrl" style="font-size: 0.7rem; margin-top: 10px; color: var(--accent);"></p>
      </div>
    </div>

    <div class="page" id="pagePerimetro">
      <h1>Definir Área Permitida</h1>
      <div style="display: flex; gap: 10px; margin: 20px 0;">
        <select id="selectorEventoPerimetro" onchange="cargarEventoPerimetro()"></select>
        <button class="btn-primary" id="btnGuardarPerimetro" onclick="guardarPerimetro()" disabled>Guardar Área</button>
        <button onclick="limpiarMapa()"
          style="background:none; border: 1px solid var(--border); color:#fff; padding:10px; border-radius:8px; cursor:pointer;">Limpiar</button>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const SUPABASE_URL = 'https://ccvluulbkjofghzpttfb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdmx1dWxia2pvZmdoenB0dGZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjI1ODksImV4cCI6MjA5MzU5ODU4OX0.Na9TJ5g3Xr22E7h-28Eol0Bv-ikXsYWvuRsoKkmRrfI';
    const BASE_URL = 'https://turtless-bit.github.io/registro-asistencia/formulario.html';

    let map, puntos = [], marcadores = [], poligonoLayer;

    async function api(path, method = 'GET', body = null) {
      const options = {
        method,
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
      };
      if (body) options.body = JSON.stringify(body);
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, options);
      return res.ok ? await res.json() : null;
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'pagePerimetro' && !map) initMap();
      if (id === 'pagePerimetro') cargarSelectores();
      if (id === 'pageRegistros') cargarSelectores();
    }

    // --- EVENTOS ---
    async function crearEvento() {
      const payload = {
        nombre: document.getElementById('evNombre').value,
        fecha: document.getElementById('evFecha').value,
        hora_inicio: document.getElementById('evHoraInicio').value,
        duracion_total_minutos: parseInt(document.getElementById('evDuracion').value)
      };

      if (!payload.nombre || !payload.fecha) return alert("Faltan datos");

      const res = await api('eventos', 'POST', payload);
      if (res) {
        alert("¡Evento creado!");
        const url = `${BASE_URL}?evento=${res[0].id}`;
        document.getElementById('qrSection').style.display = 'block';
        document.getElementById('qrUrl').innerText = url;
        new QRCode(document.getElementById('qrBox'), { text: url, width: 128, height: 128 });
      }
    }

    // --- MAPA Y PERÍMETRO ---
    function initMap() {
      map = L.map('map').setView([-13.65, -73.33], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      map.on('click', (e) => {
        const p = [e.latlng.lat, e.latlng.lng];
        puntos.push(p);
        marcadores.push(L.marker(p).addTo(map));
        dibujar();
      });
    }

    function dibujar() {
      if (poligonoLayer) map.removeLayer(poligonoLayer);
      if (puntos.length > 2) {
        poligonoLayer = L.polygon(puntos, { color: '#4f8ef7', fillOpacity: 0.3 }).addTo(map);
        document.getElementById('btnGuardarPerimetro').disabled = false;
      } else if (puntos.length === 2) {
        poligonoLayer = L.polyline(puntos, { color: '#4f8ef7' }).addTo(map);
      }
    }

    async function guardarPerimetro() {
      const id = document.getElementById('selectorEventoPerimetro').value;
      await api(`eventos?id=eq.${id}`, 'PATCH', { perimetro: puntos });
      alert("Área guardada");
    }

    function limpiarMapa() {
      puntos = [];
      marcadores.forEach(m => map.removeLayer(m));
      if (poligonoLayer) map.removeLayer(poligonoLayer);
      document.getElementById('btnGuardarPerimetro').disabled = true;
    }

    // --- SELECTORES Y REGISTROS ---
    async function cargarSelectores() {
      const evs = await api('eventos?select=id,nombre');
      const html = evs.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
      document.getElementById('selectorEventoRegistros').innerHTML = html;
      document.getElementById('selectorEventoPerimetro').innerHTML = html;
    }

    async function cargarRegistros() {
      const id = document.getElementById('selectorEventoRegistros').value;
      const data = await api(`asistencias?evento_id=eq.${id}`);
      document.getElementById('tablaBody').innerHTML = data.map(r => `
        <tr><td>${r.nombre}</td><td>${r.dni}</td><td>${r.estado}</td><td>${r.check1_hora || '-'}</td><td>${r.check2_hora || '-'}</td></tr>
      `).join('');
    }

    window.onload = cargarSelectores;
  </script>
</body>

</html>
