<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — Registro de Asistencia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

    :root {
      --bg: #0a0c14;
      --surface: #12151f;
      --surface2: #1a1e2e;
      --surface3: #222840;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --success: #10b981;
      --error: #ef4444;
      --warn: #f59e0b;
      --text: #e8eaf0;
      --muted: #6b7280;
      --border: #252a40;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-logo h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.3;
    }

    .sidebar-logo p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(79, 142, 247, 0.06);
    }

    .nav-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
    }

    .main {
      margin-left: 220px;
      padding: 32px;
      min-height: 100vh;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-value.ok {
      color: var(--success);
    }

    .stat-value.warn {
      color: var(--warn);
    }

    .stat-value.error {
      color: var(--error);
    }

    .stat-value.accent {
      color: var(--accent);
    }

    .stat-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .table-toolbar {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .table-toolbar input,
    .table-toolbar select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }

    .btn-export {
      margin-left: auto;
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-export:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    tbody td {
      padding: 13px 16px;
      vertical-align: middle;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.completado {
      background: rgba(16, 185, 129, 0.12);
      color: #10b981;
    }

    .badge.pendiente {
      background: rgba(79, 142, 247, 0.12);
      color: #4f8ef7;
    }

    .badge.parcial {
      background: rgba(245, 158, 11, 0.12);
      color: #f59e0b;
    }

    .badge.fuera {
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
    }

    .alerta-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      max-width: 600px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    input[type=text],
    input[type=date],
    input[type=number],
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn-primary {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      opacity: 0.88;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 9px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-right: 8px;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .qr-section {
      margin-top: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .qr-box {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      min-width: 160px;
      min-height: 160px;
    }

    .qr-info h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .qr-info p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .qr-url {
      font-size: 0.75rem;
      color: var(--accent);
      word-break: break-all;
      background: rgba(79, 142, 247, 0.08);
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-family: monospace;
    }

    .map-section {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .map-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    #map {
      width: 100%;
      height: 400px;
      background: var(--surface2);
      position: relative;
    }

    .map-instructions {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 12, 20, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: var(--muted);
      pointer-events: none;
      z-index: 10;
    }

    .puntos-list {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      max-height: 160px;
      overflow-y: auto;
    }

    .punto-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .punto-item:last-child {
      border-bottom: none;
    }

    .punto-coords {
      color: var(--muted);
      font-family: monospace;
    }

    .btn-del {
      background: none;
      border: none;
      color: var(--error);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .alert {
      padding: 11px 16px;
      border-radius: 9px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .alert.visible {
      display: block;
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
      }

      .sidebar-logo,
      .nav-item span {
        display: none;
      }

      .nav-item {
        justify-content: center;
        padding: 14px;
      }

      .main {
        margin-left: 60px;
        padding: 20px 16px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

    <div class="sidebar-logo">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
